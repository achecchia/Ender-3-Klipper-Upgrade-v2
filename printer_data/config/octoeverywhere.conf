###############################################################################################################
# Project Leonardo - OctoEverywhere Config
#
# File:
#   ~/printer_data/config/octoeverywhere.conf
#
# Purpose:
# - Main OctoEverywhere plugin/service configuration.
# - Controls what local frontend OctoEverywhere exposes remotely.
# - Controls webcam stream/snapshot URLs used for remote view, Gadget AI, and notifications.
#
# Keep this file if you use OctoEverywhere.
# Do not delete this unless you fully uninstall OctoEverywhere.
###############################################################################################################

[relay]
# Mainsail normally runs through the local web frontend on port 80.
frontend_port = 80

# UI hint only. This helps OctoEverywhere know the frontend is Mainsail.
frontend_type_hint = Mainsail


[logging]
# INFO is the right normal-use level.
# Use DEBUG only when actively troubleshooting OctoEverywhere.
log_level = INFO

# Small logs are fine for a Pi.
# Increase max_file_count to 2 or 3 only if you need more history for debugging.
max_file_size_mb = 3
max_file_count = 1


[server]
# Intentionally blank unless OctoEverywhere adds settings here.


[webcam]
# Default lets OctoEverywhere use the first/default camera it can detect from Mainsail/Fluidd.
# Once Crowsnest/webcam is confirmed working, this can usually stay Default.
webcam_name_to_use_as_primary = Default

# True lets OctoEverywhere read webcam settings from Mainsail/Fluidd.
# Keep this True unless you want to manually force stream/snapshot URLs below.
auto_settings_detection = True

# These paths match the normal Mainsail/Crowsnest proxied webcam routes.
# They will only work once Crowsnest and the webcam are working.
stream_url = /webcam/?action=stream
snapshot_url = /webcam/?action=snapshot

# Camera orientation options.
flip_horizontally = False
flip_vertically = False
rotate = 0


[general]
# Bed temp below this value triggers/helps cooldown notifications.
bed_cooldown_threshold_temp_celsius = 40.0


[moonraker]
# Leave blank unless your Moonraker requires an API key.
# Mainsail can generate an API key if needed.
moonraker_api_key =
