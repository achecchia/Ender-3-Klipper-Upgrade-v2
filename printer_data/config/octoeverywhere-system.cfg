###############################################################################################################
# Project Leonardo - OctoEverywhere Moonraker Update Manager Config
#
# File:
#   ~/printer_data/config/octoeverywhere-system.cfg
#
# Purpose:
# - Lets Moonraker/Mainsail see and update the OctoEverywhere service.
# - Registers the OctoEverywhere managed service with Moonraker.
#
# Important:
# - The [announcements] section lives in moonraker.conf.
# - Do not define [announcements] again here, or Moonraker may complain about duplicate sections.
###############################################################################################################

[update_manager octoeverywhere]
type: git_repo

# Existing installer setting. Leave as-is unless the OctoEverywhere installer changes it.
channel: beta

path: /home/pi/octoeverywhere
origin: https://github.com/QuinnDamerell/OctoPrint-OctoEverywhere.git

# Existing virtual environment path from the installer.
env: /home/pi/octoeverywhere-env/bin/python
#virtualenv: /home/pi/octoeverywhere-env

requirements: requirements.txt
install_script: install.sh

managed_services:
  octoeverywhere
