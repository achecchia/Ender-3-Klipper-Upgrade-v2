###############################################################################################################
# Project Leonardo - mobileraker.conf
#
# Purpose:
# - Config for Mobileraker Companion.
# - Used for mobile app notifications/status through Moonraker.
#
# Keep this file only if you use Mobileraker Companion.
# If you do not use Mobileraker, this file can be archived or deleted.
#
# Notes:
# - This is not required for Klipper, Mainsail, Moonraker, Crowsnest, or OctoEverywhere.
# - It is its own convenience/notification layer.
# - Webcam snapshots depend on the camera/Crowsnest being working first.
###############################################################################################################

[general]
# Use an actual timezone name instead of EDT.
# This avoids daylight-savings weirdness.
timezone: America/New_York

# ETA format used in notifications.
# Percent signs must be doubled in this config.
eta_format: %%m/%%d/%%Y, %%H:%%M:%%S

# Snapshot support is only useful if:
# 1. Mobileraker supports it for your setup/account.
# 2. Crowsnest/webcam is working.
# 3. The snapshot_uri below is reachable from the Pi.
include_snapshot: True


[printer default]
# Local Moonraker websocket.
# This is correct when Mobileraker Companion runs on the same Pi as Moonraker.
moonraker_uri: ws://127.0.0.1:7125/websocket

# Leave False unless your Moonraker setup requires an API key.
moonraker_api_key: False

# Local webcam snapshot URL.
# This should match the Crowsnest/Mainsail default webcam route.
snapshot_uri: http://127.0.0.1/webcam/?action=snapshot

# Valid values: 0, 90, 180, 270
snapshot_rotation: 0

# Comma-separated list of filament sensor names to ignore.
# Example:
# ignore_filament_sensors: runout_sensor,toolhead_sensor
ignore_filament_sensors:
