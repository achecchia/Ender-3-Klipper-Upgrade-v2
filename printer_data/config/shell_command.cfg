###############################################################################################################
# Project Leonardo - Shell Command Helpers
#
# Purpose:
# - Trigger Klipper-Backup / GitHub backup from Mainsail/Klipper.
# - Pull latest GitHub changes into the local backup repo when needed.
#
# Notes:
# - This file requires Klipper's gcode_shell_command support to be installed/enabled.
# - Keep this file included from printer.cfg only if these shell helpers are actually installed.
# - These commands touch Git repos/scripts on the Pi, so treat them like power tools:
#   useful, but don't wave them around while drunk on confidence.
#
# Expected paths:
# - Backup script: $HOME/klipper-backup/script.sh
# - Local backup repo: $HOME/config_backup
###############################################################################################################

###############################################################################################################
# Push Current Configs to GitHub / Klipper-Backup
###############################################################################################################

[gcode_macro UPDATE_GIT]
description: Push current Klipper configs to GitHub using Klipper-Backup. Usage: UPDATE_GIT MESSAGE="your commit message"
gcode:
    {% set message = params.MESSAGE|default("")|string %}
    {% if message|length > 0 %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{message}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}


# Friendly alias, because "backup configs" is easier to remember at 1AM.
[gcode_macro BACKUP_CONFIGS]
description: Alias for UPDATE_GIT. Usage: BACKUP_CONFIGS MESSAGE="your commit message"
gcode:
    {% set message = params.MESSAGE|default("")|string %}
    {% if message|length > 0 %}
        UPDATE_GIT MESSAGE="{message}"
    {% else %}
        UPDATE_GIT
    {% endif %}


[gcode_shell_command update_git_script]
command: bash -lc 'if [ -x "$HOME/klipper-backup/script.sh" ]; then bash "$HOME/klipper-backup/script.sh"; else echo "ERROR: $HOME/klipper-backup/script.sh not found or not executable"; exit 1; fi'
timeout: 120.0
verbose: True


[gcode_shell_command update_git_script_message]
command: bash -lc 'if [ -x "$HOME/klipper-backup/script.sh" ]; then bash "$HOME/klipper-backup/script.sh" -c "$0"; else echo "ERROR: $HOME/klipper-backup/script.sh not found or not executable"; exit 1; fi'
timeout: 120.0
verbose: True

###############################################################################################################
# Pull Latest GitHub Changes Into Local Backup Repo
###############################################################################################################

[gcode_macro PULL_FROM_GIT]
description: Pull latest GitHub repo changes into the local Klipper-Backup repo without pushing
gcode:
    RUN_SHELL_COMMAND CMD=pull_from_git_script


[gcode_shell_command pull_from_git_script]
command: bash -lc 'if [ -d "$HOME/config_backup/.git" ]; then cd "$HOME/config_backup" && git restore . && git pull --ff-only && git status --short && if [ -d docs ]; then ls -la docs; else echo "No docs directory found"; fi; else echo "ERROR: $HOME/config_backup is not a git repo"; exit 1; fi'
timeout: 120.0
verbose: True

###############################################################################################################
# Optional Diagnostics
###############################################################################################################

[gcode_macro CHECK_GIT_HELPERS]
description: Check that expected backup paths exist on the Pi
gcode:
    RUN_SHELL_COMMAND CMD=check_git_helpers_script


[gcode_shell_command check_git_helpers_script]
command: bash -lc 'echo "Checking Project Leonardo Git helper paths..."; test -e "$HOME/klipper-backup/script.sh" && ls -l "$HOME/klipper-backup/script.sh" || echo "Missing: $HOME/klipper-backup/script.sh"; test -d "$HOME/config_backup/.git" && echo "OK: $HOME/config_backup is a git repo" || echo "Missing/not git repo: $HOME/config_backup"; git --version'
timeout: 60.0
verbose: True
