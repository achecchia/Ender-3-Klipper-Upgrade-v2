###############################################################################################################
#                                             Additional Features:                                            #
###############################################################################################################
# NOTE:
# [exclude_object] lives in printer.cfg now.
# Do not also define it here, or Klipper may throw a duplicate section error.

[pause_resume]
recover_velocity: 300.0

###############################################################################################################
#                                      Start/End/Pause/Resume/Cancel:                                         #
###############################################################################################################

[gcode_macro PRINT_START]
description: Start print routine: heat bed, home, mesh, heat nozzle, purge
gcode:
  {% set BED = params.BED_TEMP|int %}
  {% set EXTRUDER = params.EXTRUDER_TEMP|int %}
  G90                                  ; Set absolute positioning
  M190 S{BED}                          ; Set bed temperature and wait
  G28                                  ; Home all axes
  _WAIT TIME=60                        ; Wait for bed/gantry to settle
  BED_MESH_CLEAR                       ; Clear old bed mesh
  BED_MESH_CALIBRATE                   ; Adaptive mesh if object data exists, otherwise normal mesh
  M109 S{EXTRUDER}                     ; Set extruder temperature and wait
  _ADAPTIVE_PURGE                      ; Adaptive purge near printed object if object data exists
  G0 Z5 F3000                          ; Move up


[gcode_macro PRINT_END]
description: End print routine: move away, retract, park, shut down heaters, disable motors
gcode:
  _MOVE_AWAY                           ; Move away from print
  G1 E-3 F1800                         ; Small direct-drive friendly retract
  PARK_CENTER_REAR                     ; Park central rear
  TURN_OFF_HEATERS                     ; Turn off hotend and bed
  M84                                  ; Disable motors


# From Mainsail macro
[gcode_macro PAUSE]
description: Pause the active print and park the toolhead
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  _TOOLHEAD_PARK_PAUSE_CANCEL
  {% if printer["gcode_macro status_busy"] != null %}
    status_busy
  {% endif %}


# From Mainsail macro
[gcode_macro RESUME]
description: Resume the active print
rename_existing: RESUME_BASE
gcode:
  ##### Read extrude from _TOOLHEAD_PARK_PAUSE_CANCEL macro #####
  {% set extrude = printer['gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL'].extrude %}

  ##### Get VELOCITY parameter if specified #####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
  {% else %}
    {% set get_params = "" %}
  {% endif %}

  ##### Resume extrusion if hot enough #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    M83
    G1 E{extrude} F2100
    {% if printer.gcode_move.absolute_extrude|lower == 'true' %}
      M82
    {% endif %}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}

  RESUME_BASE {get_params}

  {% if printer["gcode_macro status_printing"] != null %}
    status_printing
  {% endif %}


# From Mainsail macro
[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
variable_extrude: 1.0
gcode:
  ##### Set park position for X and Y #####
  {% set x_park = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_park = printer.toolhead.axis_maximum.y %}
  {% set z_park_delta = 2.0 %}

  ##### Calculate safe lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - z_park_delta) %}
    {% set z_safe = z_park_delta %}
  {% else %}
    {% set z_safe = max_z - act_z %}
  {% endif %}

  ##### Retract if hot enough #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    M83
    G1 E-{extrude} F2100
    {% if printer.gcode_move.absolute_extrude|lower == 'true' %}
      M82
    {% endif %}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}

  ##### Park if homed #####
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
    {% if printer.gcode_move.absolute_coordinates|lower == 'false' %}
      G91
    {% endif %}
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}

###############################################################################################################
#                                              References:                                                    #
###############################################################################################################

[gcode_macro M0]
description: Pause alias
gcode:
  PAUSE


[gcode_macro M600]
description: Filament change helper
gcode:
  {% set X = params.X|default(50)|float %}
  {% set Y = params.Y|default(0)|float %}
  {% set Z = params.Z|default(10)|float %}
  SAVE_GCODE_STATE NAME=M600_state
  PAUSE
  G91
  G1 E-.8 F2700
  G1 Z{Z}
  G90
  G1 X{X} Y{Y} F3000
  G91
  G1 E-50 F1000
  RESTORE_GCODE_STATE NAME=M600_state


[gcode_macro M190]
description: Wait for bed temperature with optional status hooks
rename_existing: M190.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}
  M190.1 {rawparams}
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro M109]
description: Wait for hotend temperature with optional status hooks
rename_existing: M109.1
gcode:
  {% if printer["gcode_macro status_heating"] != null %}
    status_heating
  {% endif %}
  M109.1 {rawparams}
  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro _WAIT]
description: Wait helper. TIME is in seconds.
gcode:
  {% set TIME = params.TIME|default(0)|int %}
  G4 P{TIME * 1000}


[gcode_macro _CQGL]
description: Quad gantry level helper. Not used on Ender 3 unless quad_gantry_level exists.
gcode:
  {% if printer.configfile.settings.quad_gantry_level is defined %}
    {% if printer.quad_gantry_level.applied == False %}
      {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
      {% endif %}
      {% if printer["gcode_macro status_leveling"] != null %}
        status_leveling
      {% endif %}
      QUAD_GANTRY_LEVEL
      G28 Z
    {% endif %}
  {% else %}
    {action_respond_info("quad_gantry_level is not configured on this printer")}
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}

###############################################################################################################
#                                      Adaptive Mesh / Adaptive Purge:                                        #
###############################################################################################################

[gcode_macro BED_MESH_CALIBRATE]
description: Adaptive bed mesh wrapper for Ender 3 with BLTouch. Falls back to normal bed mesh if no object data exists.
rename_existing: _BED_MESH_CALIBRATE
variable_buffer: 2
gcode:
  ##### Get bed_mesh config #####
  {% set bedMeshConfig = printer['configfile'].config["bed_mesh"] %}
  {% set bed_mesh_min = bedMeshConfig.mesh_min %}
  {% set bed_mesh_max = bedMeshConfig.mesh_max %}

  ##### Get object points from [exclude_object] object labeling #####
  {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
  {% set x_min = all_points | map(attribute=0) | min | default(bed_mesh_min.split(",")[0]|float) %}
  {% set y_min = all_points | map(attribute=1) | min | default(bed_mesh_min.split(",")[1]|float) %}
  {% set x_max = all_points | map(attribute=0) | max | default(bed_mesh_max.split(",")[0]|float) %}
  {% set y_max = all_points | map(attribute=1) | max | default(bed_mesh_max.split(",")[1]|float) %}

  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

  ##### Configured mesh limits #####
  {% set mesh_min_x = bed_mesh_min.split(",")[0]|float %}
  {% set mesh_min_y = bed_mesh_min.split(",")[1]|float %}
  {% set mesh_max_x = bed_mesh_max.split(",")[0]|float %}
  {% set mesh_max_y = bed_mesh_max.split(",")[1]|float %}

  ##### Print/object limits #####
  {% set print_min_x = x_min|float %}
  {% set print_min_y = y_min|float %}
  {% set print_max_x = x_max|float %}
  {% set print_max_y = y_max|float %}

  ##### Keep adaptive mesh inside configured bed mesh area #####
  {% if (print_min_x < mesh_min_x) or (print_max_x > mesh_max_x) or (print_min_y < mesh_min_y) or (print_max_y > mesh_max_y) %}
    {% set print_min_x = mesh_min_x %}
    {% set print_min_y = mesh_min_y %}
    {% set print_max_x = mesh_max_x %}
    {% set print_max_y = mesh_max_y %}
  {% endif %}

  ##### If object data exists and makes a valid area, run adaptive mesh #####
  {% if (print_min_x < print_max_x) and (print_min_y < print_max_y) %}
    {% set minimum_probe_count = 3 %}
    {% set medium_probe_count = 5 %}

    {% set probe_count = bedMeshConfig.probe_count.split(",") %}
    {% set probe_count_x = probe_count[0]|int %}
    {% if probe_count.__len__() > 1 %}
      {% set probe_count_y = probe_count[1]|int %}
    {% else %}
      {% set probe_count_y = probe_count_x|int %}
    {% endif %}

    ##### Reduce probe count for smaller print areas #####
    {% if print_max_x - print_min_x < (mesh_max_x - mesh_min_x) * 0.75 %}
      {% set probe_count_x = medium_probe_count %}
    {% endif %}
    {% if print_max_y - print_min_y < (mesh_max_y - mesh_min_y) * 0.75 %}
      {% set probe_count_y = medium_probe_count %}
    {% endif %}
    {% if print_max_x - print_min_x < (mesh_max_x - mesh_min_x) * 0.50 %}
      {% set probe_count_x = minimum_probe_count %}
    {% endif %}
    {% if print_max_y - print_min_y < (mesh_max_y - mesh_min_y) * 0.50 %}
      {% set probe_count_y = minimum_probe_count %}
    {% endif %}

    ##### Add buffer while staying inside safe mesh area #####
    {% if print_min_x - buffer >= mesh_min_x %}
      {% set mesh_min_x = print_min_x - buffer %}
    {% endif %}
    {% if print_min_y - buffer >= mesh_min_y %}
      {% set mesh_min_y = print_min_y - buffer %}
    {% endif %}
    {% if print_max_x + buffer <= mesh_max_x %}
      {% set mesh_max_x = print_max_x + buffer %}
    {% endif %}
    {% if print_max_y + buffer <= mesh_max_y %}
      {% set mesh_max_y = print_max_y + buffer %}
    {% endif %}

    {action_respond_info("Adaptive mesh_min: %s,%s" % (mesh_min_x, mesh_min_y))}
    {action_respond_info("Adaptive mesh_max: %s,%s" % (mesh_max_x, mesh_max_y))}
    {action_respond_info("Adaptive probe_count: %s,%s" % (probe_count_x, probe_count_y))}

    {% if printer["gcode_macro status_meshing"] != null %}
      status_meshing
    {% endif %}

    _BED_MESH_CALIBRATE mesh_min={mesh_min_x},{mesh_min_y} mesh_max={mesh_max_x},{mesh_max_y} probe_count={probe_count_x},{probe_count_y}

  ##### No object data? Run normal bed mesh from printer.cfg #####
  {% else %}
    {% if printer["gcode_macro status_meshing"] != null %}
      status_meshing
    {% endif %}
    {action_respond_info("No valid object data found. Running full configured bed mesh.")}
    _BED_MESH_CALIBRATE
  {% endif %}

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


# Klipper Adaptive Purging - VoronDesign Logo
# Credits: https://github.com/kyleisah/Klipper-Adaptive-Meshing-Purging/blob/main/Configuration/Adaptive_Purge.cfg
# Credits: Insane Version 1.1 - 03-Feb-2023
[gcode_macro _ADAPTIVE_PURGE]
description: Adaptive purge near printed objects, or default front-left purge if no object data exists
variable_adaptive_enable: True
variable_z_height: 0.4
variable_tip_distance: 10
variable_purge_amount: 40
variable_flow_rate: 10
variable_x_default: 5
variable_y_default: 5
variable_size: 10
variable_distance_to_object_x: 5
variable_distance_to_object_y: 5
gcode:
  {% if adaptive_enable == True %}
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
    {% set x_origin = (all_points | map(attribute=0) | min | default(x_default + distance_to_object_x + size)) - distance_to_object_x - size %}
    {% set y_origin = (all_points | map(attribute=1) | min | default(y_default + distance_to_object_y + size)) - distance_to_object_y - size %}
    {% set x_origin = ([x_origin, x_default] | max) %}
    {% set y_origin = ([y_origin, y_default] | max) %}
  {% else %}
    {% set x_origin = x_default|float %}
    {% set y_origin = y_default|float %}
  {% endif %}

  {% set purge_move_speed = 2.31 * size * flow_rate / (purge_amount * 2.405) %}
  {% set prepurge_speed = flow_rate / 2.405 %}
  {% set travel_speed = printer.toolhead.max_velocity %}

  {action_respond_info("Purge x: " + x_origin|string + " y: " + y_origin|string + " purge_move_speed: " + purge_move_speed|string + " prepurge_speed: " + prepurge_speed|string)}

  G92 E0
  G0 F{travel_speed * 5}
  G90
  G0 X{x_origin} Y{y_origin + size / 2}
  G0 Z{z_height}
  M83
  G1 E{tip_distance} F{prepurge_speed * 60}
  G1 X{x_origin + size * 0.289} Y{y_origin + size} E{purge_amount / 4} F{purge_move_speed * 60}
  G1 E-.5 F2100
  G0 Z{z_height * 2}
  G0 X{x_origin + size * 0.789} Y{y_origin + size}
  G0 Z{z_height}
  G1 E.5 F2100
  G1 X{x_origin + size * 0.211} Y{y_origin} E{purge_amount / 2} F{purge_move_speed * 60}
  G1 E-.5 F2100
  G0 Z{z_height * 2}
  G0 X{x_origin + size * 0.711} Y{y_origin}
  G0 Z{z_height}
  G1 E.5 F2100
  G1 X{x_origin + size} Y{y_origin + size / 2} E{purge_amount / 4} F{purge_move_speed * 60}
  G1 E-.5 F2100
  G92 E0
  M82
  G0 Z{z_height * 2}

  {% if printer["gcode_macro status_printing"] != null %}
    status_printing
  {% endif %}

###############################################################################################################
#                                          Basic Utility Macros:                                              #
###############################################################################################################

[gcode_macro HOME_IF_NEEDED]
description: Home all axes only if printer is not already homed
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% else %}
    {action_respond_info("Printer already homed")}
  {% endif %}


[gcode_macro PARK_CENTER]
description: Park toolhead near bed center for inspection or maintenance
gcode:
  SAVE_GCODE_STATE NAME=PARK_CENTER_STATE
  HOME_IF_NEEDED
  G90
  G1 Z20 F1200
  G1 X117.5 Y117.5 F6000
  RESTORE_GCODE_STATE NAME=PARK_CENTER_STATE


[gcode_macro HEAT_SOAK_BED]
description: Heat bed and wait. Usage: HEAT_SOAK_BED TEMP=60 TIME=300
gcode:
  {% set TEMP = params.TEMP|default(60)|float %}
  {% set TIME = params.TIME|default(300)|int %}
  M140 S{TEMP}
  M190 S{TEMP}
  M117 Heat soaking bed
  {action_respond_info("Heat soaking bed at %.1fC for %d seconds" % (TEMP, TIME))}
  G4 P{TIME * 1000}
  M117 Heat soak complete
  {action_respond_info("Heat soak complete")}


[gcode_macro PID_HOTEND]
description: Convenience macro for hotend PID tune. Usage: PID_HOTEND TEMP=220
gcode:
  {% set TEMP = params.TEMP|default(220)|float %}
  {action_respond_info("Starting hotend PID tune at %.1fC" % TEMP)}
  PID_CALIBRATE HEATER=extruder TARGET={TEMP}


[gcode_macro PID_BED]
description: Convenience macro for bed PID tune. Usage: PID_BED TEMP=60
gcode:
  {% set TEMP = params.TEMP|default(60)|float %}
  {action_respond_info("Starting bed PID tune at %.1fC" % TEMP)}
  PID_CALIBRATE HEATER=heater_bed TARGET={TEMP}


[gcode_macro TEST_SPEED_SAFE]
description: Conservative motion sanity check. Homes if needed, then runs a simple XY movement box.
gcode:
  HOME_IF_NEEDED
  G90
  G1 Z10 F1200
  G1 X10 Y10 F6000
  G1 X225 Y10 F12000
  G1 X225 Y225 F12000
  G1 X10 Y225 F12000
  G1 X10 Y10 F12000
  G1 X117.5 Y117.5 F12000
  {action_respond_info("TEST_SPEED_SAFE complete")}


###############################################################################################################
#                                              Movement Helpers:                                              #
###############################################################################################################

[gcode_macro _MOVE_AWAY]
description: Small move away from the finished print
gcode:
  {% set th = printer.toolhead %}
  {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
  {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
  {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}

  G90
  G0 X{x_safe} Y{y_safe} Z{z_safe} F20000


[gcode_macro PARK_CENTER_REAR]
description: Park toolhead centered at rear
gcode:
  {% if printer["gcode_macro status_busy"] != null %}
    status_busy
  {% endif %}

  {% set th = printer.toolhead %}
  G90
  G0 X{th.axis_maximum.x // 2} Y{th.axis_maximum.y - 2} F3600

  {% if printer["gcode_macro status_ready"] != null %}
    status_ready
  {% endif %}


[gcode_macro PARK_FRONT]
description: Park toolhead near the front for maintenance
gcode:
  SAVE_GCODE_STATE NAME=PARK_FRONT_STATE
  G90
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  G1 Z20 F1200
  G1 X117.5 Y20 F6000
  RESTORE_GCODE_STATE NAME=PARK_FRONT_STATE


[gcode_macro PARK_REAR]
description: Park toolhead near the rear
gcode:
  SAVE_GCODE_STATE NAME=PARK_REAR_STATE
  G90
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  G1 Z20 F1200
  G1 X117.5 Y220 F6000
  RESTORE_GCODE_STATE NAME=PARK_REAR_STATE

###############################################################################################################
#                                                  Testing:                                                   #
###############################################################################################################

[gcode_macro TEST_PROBE]
description: Home and run BLTouch probe accuracy test
gcode:
  G28
  PROBE_ACCURACY SAMPLES=10


[gcode_macro TEST_SPEED]
description: Test max speed and acceleration. Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10
gcode:
  ##### Parameters #####
  {% set speed = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
  {% set iterations = params.ITERATIONS|default(5)|int %}
  {% set accel = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
  {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
  {% set bound = params.BOUND|default(20)|int %}
  {% set smallpatternsize = params.SMALLPATTERNSIZE|default(20)|int %}

  ##### Large pattern bounds #####
  {% set x_min = printer.toolhead.axis_minimum.x + bound %}
  {% set x_max = printer.toolhead.axis_maximum.x - bound %}
  {% set y_min = printer.toolhead.axis_minimum.y + bound %}
  {% set y_max = printer.toolhead.axis_maximum.y - bound %}

  ##### Small center pattern #####
  {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float) / 2 %}
  {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float) / 2 %}
  {% set x_center_min = x_center - (smallpatternsize / 2) %}
  {% set x_center_max = x_center + (smallpatternsize / 2) %}
  {% set y_center_min = y_center - (smallpatternsize / 2) %}
  {% set y_center_max = y_center + (smallpatternsize / 2) %}

  SAVE_GCODE_STATE NAME=TEST_SPEED

  {action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel))}

  ##### Home and read starting position #####
  M400
  G28

  {% if printer.configfile.settings.quad_gantry_level is defined %}
    {% if printer.quad_gantry_level.applied == False %}
      QUAD_GANTRY_LEVEL
      G28 Z
    {% endif %}
  {% endif %}

  G90
  G1 X{printer.toolhead.axis_maximum.x - 50} Y{printer.toolhead.axis_maximum.y - 50} F{30 * 60}
  M400
  G28 X Y
  G0 X{printer.toolhead.axis_maximum.x - 1} Y{printer.toolhead.axis_maximum.y - 1} F{30 * 60}
  G4 P1000
  GET_POSITION

  ##### Go to start position #####
  G0 X{x_min} Y{y_min} Z{bound + 10} F{speed * 60}

  ##### Set velocity limits #####
  {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
  {% else %}
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel}
  {% endif %}

  ##### Movement torture test #####
  {% for i in range(iterations) %}
    # Large pattern diagonals
    G0 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_max} Y{y_max} F{speed * 60}
    G0 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60}
    G0 X{x_min} Y{y_max} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60}

    # Large pattern box
    G0 X{x_min} Y{y_min} F{speed * 60}
    G0 X{x_min} Y{y_max} F{speed * 60}
    G0 X{x_max} Y{y_max} F{speed * 60}
    G0 X{x_max} Y{y_min} F{speed * 60}

    # Small pattern diagonals
    G0 X{x_center_min} Y{y_center_min} F{speed * 60}
    G0 X{x_center_max} Y{y_center_max} F{speed * 60}
    G0 X{x_center_min} Y{y_center_min} F{speed * 60}
    G0 X{x_center_max} Y{y_center_min} F{speed * 60}
    G0 X{x_center_min} Y{y_center_max} F{speed * 60}
    G0 X{x_center_max} Y{y_center_min} F{speed * 60}

    # Small pattern box
    G0 X{x_center_min} Y{y_center_min} F{speed * 60}
    G0 X{x_center_min} Y{y_center_max} F{speed * 60}
    G0 X{x_center_max} Y{y_center_max} F{speed * 60}
    G0 X{x_center_max} Y{y_center_min} F{speed * 60}
  {% endfor %}

  ##### Restore configured max speed/accel #####
  {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
  {% else %}
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel}
  {% endif %}

  ##### Re-home and read ending position #####
  M400
  G28
  G90
  G0 X{printer.toolhead.axis_maximum.x - 1} Y{printer.toolhead.axis_maximum.y - 1} F{30 * 60}
  G4 P1000
  GET_POSITION

  RESTORE_GCODE_STATE NAME=TEST_SPEED
