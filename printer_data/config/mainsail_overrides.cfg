###############################################################################################################
# Project Leonardo - Mainsail Overrides
#
# Purpose:
# - Customize Mainsail's standard read-only mainsail.cfg without editing/replacing mainsail.cfg.
#
# Why this exists:
# - mainsail.cfg is managed by Mainsail and may be read-only.
# - Put Project Leonardo-specific Mainsail client variables here instead.
#
# Include order in printer.cfg should be:
#   [include mainsail.cfg]
#   [include mainsail_overrides.cfg]
#   [include shell_command.cfg]
#   [include macros.cfg]
#
# Ownership:
# - mainsail.cfg owns PAUSE, RESUME, CANCEL_PRINT, [pause_resume], [display_status], and [respond].
# - this file only defines _CLIENT_VARIABLE.
# - macros.cfg should not define PAUSE, RESUME, CANCEL_PRINT, or [pause_resume].
###############################################################################################################

[gcode_macro _CLIENT_VARIABLE]
description: Project Leonardo Mainsail pause/resume/cancel tuning

# Park behavior
variable_use_custom_pos   : True
variable_custom_park_x    : 117.5
variable_custom_park_y    : 220.0
variable_custom_park_dz   : 5.0

# Retract behavior
variable_retract          : 1.0
variable_cancel_retract   : 3.0
variable_speed_retract    : 35.0
variable_unretract        : 1.0
variable_speed_unretract  : 35.0

# Movement behavior
variable_speed_hop        : 15.0
variable_speed_move       : 100.0

# Cancel behavior
variable_park_at_cancel   : True
variable_park_at_cancel_x : 117.5
variable_park_at_cancel_y : 220.0

# Feature toggles / hooks
variable_use_fw_retract   : False
variable_idle_timeout     : 0
variable_runout_sensor    : ""
variable_user_pause_macro : ""
variable_user_resume_macro: ""
variable_user_cancel_macro: ""

gcode:
