###############################################################################################################
# Project Leonardo - adxlmcu.cfg
#
# Purpose:
# - Temporary ADXL345 / accelerometer helper config for input-shaper testing.
# - This is only needed while the ADXL/accelerometer MCU is connected.
#
# Normal printing:
# - Leave this file on the Pi if you want.
# - Keep it commented out in printer.cfg during normal printing:
#
#     #[include adxlmcu.cfg]
#
# Input-shaper testing:
# - Plug in the accelerometer MCU.
# - Uncomment the include in printer.cfg:
#
#     [include adxlmcu.cfg]
#
# - Restart Klipper.
# - Run your resonance tests.
# - Save the resulting input_shaper values.
# - Comment this include back out afterward.
#
# Why:
# - If the ADXL MCU is unplugged while this file is included, Klipper may fail to connect.
# - Treat this like shop equipment: use it, get your numbers, then put it back on the shelf.
###############################################################################################################

###############################################################################################################
# ADXL MCU
###############################################################################################################

[mcu adxl]
serial: /dev/serial/by-id/usb-Anchor_Rampon-if00

###############################################################################################################
# ADXL345 Accelerometer
###############################################################################################################

[adxl345]
cs_pin: adxl:CS

###############################################################################################################
# Resonance Tester
###############################################################################################################

[resonance_tester]
accel_chip: adxl345

# Ender 3 / 235mm-ish bed center.
# Probe point format: X,Y,Z
# Z=20 keeps the nozzle safely above the bed while testing.
probe_points:
   117.5,117.5,20

###############################################################################################################
# Useful Commands
###############################################################################################################

# Basic accelerometer check:
#
#   ACCELEROMETER_QUERY
#
# Noise check:
#
#   MEASURE_AXES_NOISE
#
# Run resonance tests:
#
#   TEST_RESONANCES AXIS=X
#   TEST_RESONANCES AXIS=Y
#
# After testing, process the CSV files on the Pi with Klipper's calibration scripts,
# or use the Mainsail input shaper helper if available.
#
# Once final shaper values are selected, put them in printer.cfg / SAVE_CONFIG,
# then comment out [include adxlmcu.cfg] for normal printing.
###############################################################################################################
